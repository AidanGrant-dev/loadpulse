<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoadPulse — Connecting…</title>
<style>
  body { margin: 0; background: #090b0f; color: #eef0f4; font-family: 'Sora', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #00e5a0; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 16px; font-weight: 500; }
  .sub { font-size: 13px; color: #5a6070; font-family: 'DM Mono', monospace; }
  .code-box { background: #111318; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 20px; font-family: 'DM Mono', monospace; font-size: 13px; color: #00e5a0; margin-top: 8px; word-break: break-all; max-width: 480px; text-align: center; }
  .btn { margin-top: 16px; padding: 10px 24px; background: #00e5a0; color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Sora:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="title" id="title">Completing connection…</div>
<div class="sub" id="sub">Extracting authorization code</div>
<div id="extra"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state') || '';
  const error = params.get('error');

  // Detect provider from state param (e.g. "strava_1234567")
  const provider = state.startsWith('whoop') ? 'whoop' : state.startsWith('strava') ? 'strava' : 'unknown';

  if (error) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Authorization denied';
    document.getElementById('sub').textContent = error;
    document.getElementById('extra').innerHTML = '<button class="btn" onclick="window.close()">Close</button>';
  } else if (code) {
    // Try to send the code back to the opener (main LoadPulse tab)
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({ type: 'oauth_callback', provider, code }, window.location.origin);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = '✅ Connected!';
        document.getElementById('sub').textContent = 'You can close this tab.';
        setTimeout(() => window.close(), 1500);
      } catch(e) {
        showManual();
      }
    } else {
      showManual();
    }
  } else {
    document.getElementById('title').textContent = 'No code found';
    document.getElementById('sub').textContent = 'Something went wrong with the authorization.';
  }

  function showManual() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Almost there — copy this code';
    document.getElementById('sub').textContent = 'Paste it into LoadPulse to complete the connection';
    document.getElementById('extra').innerHTML = `
      <div class="code-box" id="code-display">${code}</div>
      <button class="btn" onclick="copyCode()">Copy Code</button>
    `;
  }

  function copyCode() {
    navigator.clipboard.writeText(code).then(() => {
      document.querySelector('.btn').textContent = '✓ Copied!';
    });
  }
</script>
</body>
</html>
